<figure class="img-caption-include" style="width: {{ include.capWidth }}">
    {% if include.primary %}
    <a href='/assets/img/primary/{{ include.primary }}'>
        <img src='/assets/img/primary/{{ include.primary }}' loading="lazy" alt="IMG Not Found">
    </a>
    {% else %}
    <a href='/assets/img/{{ page.date | date: "%Y-%m" }}/{{ include.image }}'>
        <img src='/assets/img/{{ page.date | date: "%Y-%m" }}/{{ include.image }}' loading="lazy" alt="IMG Not Found">
    </a>
    {% endif %}
    <figcaption>{{ include.caption }}</figcaption>
</figure>
